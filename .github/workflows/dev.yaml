name: 'CI/CD Pipeline'

on:
    push:
        branches:
            - '**'

concurrency:
    group: ci-pipeline-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v7

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.12'

            - name: Cache pip
              uses: actions/cache@v6
              with:
                  path: ~/.cache/pip
                  key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
                  restore-keys: |
                      ${{ runner.os }}-pip-

            - name: Install dependencies
              run: |
                  set -euo pipefail
                  python -m pip install --upgrade pip build
                  pip install '.[dev]'

            - name: Cache pre-commit environments
              # Replaces pre-commit/action@v3.0.1: that action is a composite
              # that still uses actions/cache@v4 internally (node20, now
              # deprecated) and hasn't cut a release updating it. Running the
              # same steps ourselves with actions/cache@v6 avoids the warning
              # without depending on an upstream release. Cache key/path
              # match pre-commit/action's exactly, so existing caches stay
              # valid.
              uses: actions/cache@v6
              with:
                  path: ~/.cache/pre-commit
                  key: pre-commit-3|${{ env.pythonLocation }}|${{ hashFiles('.pre-commit-config.yaml') }}

            - name: Run pre-commit checks
              run: pre-commit run --show-diff-on-failure --color=always --all-files

            - name: Run pytest
              run: pytest -q

    security:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Check out repository
              uses: actions/checkout@v7

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.12'

            - name: Install pip-audit
              run: |
                  python -m pip install --upgrade pip pip-audit

            - name: Install project
              run: pip install .

            - name: Run pip-audit
              run: pip-audit --desc || true
